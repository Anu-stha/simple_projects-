<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simp-1</title>
        <style>
            #container{
                border: 1px solid black;
                background-color: antiquewhite;
                width: 60%;
                height: 50%;
            }
        </style>
    <script>
        document.addEventListener("DOMContentLoaded",()=>
    {
        val=document.querySelector("#Number");
        res=document.querySelector("#result");
        btn=document.querySelector("#check");
        reset=document.getElementById("reset");
    btn.addEventListener("click",()=>
    {
        num=val.value;
            if (num.trim() === '') {
                res.textContent = "Please enter the number";
                res.style.color = "red";
            }
      else if(Number(num)===0)
    {
        res.textContent="The value is Zero";
        res.style.color = "black";
    }

    else if(Number(num)%2==0)
    {
        res.textContent="The value is even number";
        res.style.color = "black";
    }
    else
    {
    res.textContent="The value is odd number";
    res.style.color = "black";
    }
    })

    reset.addEventListener("click",()=>
{
    res.textContent="";
        val.value="";
})

    })
    </script>
</head>
<body>
        <fieldset id="container">
             <legend><h3>Simple Even Odd checker</h3></legend>
            
        <table cell padding="0px" cell spacing="0px">
           <tr>
            <td>
                <label for="Number">Enter Number:</label>
            </td>
            <td>
        <input type="text" id="Number">
            </td>
           </tr>
           <tr>
            <td>
  <button id="check">Check</button>
            </td>
            <td>
                <button id="reset">Reset</button>
            </td>
           </tr>
<tr>
    <td>
        <label for="" id="result"></label>
    </td>
</tr>
        </table>
        </fieldset>
</body>
</html></html>
